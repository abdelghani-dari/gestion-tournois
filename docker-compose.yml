services:
  backend:
    build:
      context: ./backend
    container_name: gt-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: gestion_tournois
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
    container_name: gt-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host=0.0.0.0"

  postgres:
    image: postgres:16
    container_name: gt-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gestion_tournois
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - gt-postgres-data:/var/lib/postgresql/data

volumes:
  gt-postgres-data: