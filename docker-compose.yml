services:
  backend:
    build:
      context: ./backend
    container_name: gt-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: gestion_tournois
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_STORE: file
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      APP_DEBUG: "false"
      LOG_LEVEL: warning
      PHP_CLI_SERVER_WORKERS: 4
    depends_on:
      - postgres
      - redis
    command: sh -c "test -f vendor/autoload.php || composer install && php artisan serve --no-reload --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
    container_name: gt-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host=0.0.0.0"

  postgres:
    image: postgres:16
    container_name: gt-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: gestion_tournois
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - gt-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gt-redis

volumes:
  gt-postgres-data:
  backend-vendor:
  frontend-node-modules:
